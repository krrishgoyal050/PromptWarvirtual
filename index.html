<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroSnake 2026 - Adapting to YOU</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NEUROSNAKE <span>2026</span></h1>
            <p class="subtitle">AI-Powered Dynamic Gameplay</p>
        </header>

        <main>
            <div class="game-area">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                <div id="gameOverScreen" class="overlay hidden">
                    <h2>SYSTEM FAILURE</h2>
                    <p>Score: <span id="finalScore">0</span></p>
                    <div id="aiAnalysis" class="ai-analysis-text">Analyzing your performance...</div>
                    <button id="restartBtn">REBOOT SYSTEM</button>
                </div>
                <div id="startScreen" class="overlay">
                    <h2>INITIATING SEQUENCE</h2>
                    <button id="startBtn">BEGIN</button>
                </div>
            </div>

            <aside class="dashboard">
                <div class="panel score-panel">
                    <h3>STATS</h3>
                    <div class="stat"><span class="label">SCORE:</span> <span id="scoreDisplay">0</span></div>
                    <div class="stat"><span class="label">SPEED:</span> <span id="speedDisplay">1.0x</span></div>
                    <div class="stat"><span class="label">THEME:</span> <span id="themeDisplay">CYBERPUNK</span></div>
                </div>

                <div class="panel ai-settings">
                    <h3>AI ORACLE SETTINGS</h3>
                    <input type="password" id="geminiApiKey" placeholder="Gemini API Key (Optional)" title="If left blank, uses a mock AI engine." />
                    
                    <label for="aiPersonality">AI Personality:</label>
                    <select id="aiPersonality">
                        <option value="analytical">Analytical (Professional)</option>
                        <option value="competitive">Competitive (Aggressive)</option>
                        <option value="sarcastic">Sarcastic (Humorous)</option>
                    </select>

                    <label class="toggle-container">
                        <input type="checkbox" id="aiCoachToggle" checked>
                        <span class="checkmark">Enable Real-Time Coaching</span>
                    </label>
                </div>

                <div class="panel ai-feed">
                    <h3>LIVE AI FEEDBACK</h3>
                    <div id="hintLog" class="feed-content">
                        <p class="sys-msg">> System initialized. Waiting for input...</p>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="gemini.js"></script>
    <script src="script.js"></script>
</body>
</html>
